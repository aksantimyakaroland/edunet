  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'uob-blue':   '#0047AB',
            'uob-red':    '#CE1126',
            'brand-dark': '#0D1B2A',
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'] },
          boxShadow: {
            'soft':    '0 2px 15px -3px rgba(0,0,0,0.07),0 4px 6px -2px rgba(0,0,0,0.05)',
            'premium': '0 20px 25px -5px rgba(0,0,0,0.08),0 10px 10px -5px rgba(0,0,0,0.03)',
          },
          animation: {
            'fade-in-up': 'fadeInUp 0.35s cubic-bezier(0.4,0,0.2,1) forwards',
            'fade-in':    'fadeIn 0.25s ease-out forwards',
            'slide-in':   'slideIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards',
            'page-enter': 'pageEnter 0.4s cubic-bezier(0.4,0,0.2,1) forwards',
          },
          keyframes: {
            fadeInUp:  { from:{opacity:'0',transform:'translateY(10px)'}, to:{opacity:'1',transform:'translateY(0)'} },
            fadeIn:    { from:{opacity:'0'}, to:{opacity:'1'} },
            slideIn:   { from:{transform:'translateX(100%)'}, to:{transform:'translateX(0)'} },
            pageEnter: { from:{opacity:'0',transform:'translateY(4px) scale(0.99)'}, to:{opacity:'1',transform:'translateY(0) scale(1)'} },
          },
        },
      },
    };
  </script>

      "react-intersection-observer": "https://esm.sh/react-intersection-observer@^10.0.2"

  }

  <style>
    body{background:#F5F7FA;color:#1A2332;-webkit-font-smoothing:antialiased;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}
    input,textarea{user-select:text;}
    .glass{background:rgba(255,255,255,0.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}
    ::-webkit-scrollbar-thumb:hover{background:#0047AB}
    .no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
    .page-transition{animation:pageEnter 0.4s cubic-bezier(0.4,0,0.2,1) forwards;will-change:transform,opacity}
    .social-image-container{position:relative;width:100%;overflow:hidden;border-radius:2rem;background:#EEF2F7}
    .social-image-container img{width:100%;height:auto;max-height:600px;object-fit:cover;display:block;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1)}
    .social-image-container:hover img{transform:scale(1.03)}
    @media screen and (min-width:320px) and (max-width:900px) and (orientation:landscape){#landscape-lock{display:flex!important}#root{display:none!important}}
    #landscape-lock{display:none;position:fixed;inset:0;background:#0D1B2A;color:white;z-index:9999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
