name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package build artifact
        run: zip -r edunet-${GITHUB_REF_NAME}.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: edunet-${GITHUB_REF_NAME}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          name: "Edunet ${{ github.ref_name }}"
          body: |
            **Version ${{ github.ref_name }}**

            Release officielle d'Edunet – Réseau social académique de l'Université Officielle de Bukavu (UOB).

            ### Inclus dans cette release
            - Build de production complet (dossier `dist/`)
            - Assets PWA (manifest et service worker)
            - Code source au tag correspondant

            Pour déployer :
            1. Téléchargez le fichier `edunet-${{ github.ref_name }}.zip`
            2. Décompressez-le
            3. Déployez le contenu sur Vercel, Netlify ou tout hébergeur statique.

            ---
            *Généré automatiquement par GitHub Actions*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}